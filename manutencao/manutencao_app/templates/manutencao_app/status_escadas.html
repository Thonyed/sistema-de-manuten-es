{% extends 'manutencao_app/base.html' %}

{% block titulo %}Status das Escadas{% endblock %}

{% block conteudo %}

<div class="topo">
    <h1>📊 Status das Escadas</h1>
    <p>Gerencie o status</p>
</div>

<div class="container-status">
    <div class="tabela-wrapper">
        <table>
            <tr>
                <th>ID</th>
                <th>Status</th>
                <th>Alterar</th>
            </tr>

            {% for escada in escadas %}
            <tr>
                <td>{{ escada.codigo }}</td>
                <td>
                    <span class="status {{ escada.status }}">{{ escada.status }}</span>
                </td>
                <td>
                    <form method="POST" action="{% url 'atualizar_status' escada.id %}">
                        {% csrf_token %}
                        <select name="status">
                            <option value="pendente">Pendente</option>
                            <option value="manutencao">Manutenção</option>
                            <option value="concluida">Concluída</option>
                        </select>
                        <button type="submit">Salvar</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </table>
    </div>

    <a href="{% url 'home' %}" class="voltar">← Voltar</a>
</div>

{% endblock %}
