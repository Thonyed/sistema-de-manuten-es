<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>REDFOX - MANUTENÇÃO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=DM+Sans:wght@400;500&display=swap" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
 
    body {
      font-family: 'DM Sans', sans-serif;
      background: #fff;
    }
 
    .page {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }

    .page::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: 
      linear-gradient(0deg, rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.2));
      filter: blur(8px);
      transform: scale(1.1);
      z-index: -1;
    }
 
    .card {
      background: #fff;
      border: 1.5px solid #000000;
      border-radius: 28px;
      padding: 2.5rem 2.8rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 0 0 6px #ff0000;
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.85);
}
    
 
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 2rem;
      
    }
 
    .logo-dot {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #ff0000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
 
    .logo-dot svg {
      width: 16px;
      height: 16px;
      fill: #fff;
    }
 
    .logo-text {
      font-family: Arial, sans-serif;
      font-size: 20px;
      color: #ff0000;
      font-weight: 500;
    }
 
    /* CORRIGIDO: era .h2 no style.css (com ponto = classe), aqui está correto como tag */
    h2 {
      font-family: Arial, sans-serif;
      font-size: 26px;
      font-weight: 500;
      color: #000000;
      margin-bottom: 6px;
    }
 
    .subtitle {
      font-size: 13px;
      color: #000000;
      margin-bottom: 2rem;
    }
 
    .field {
      margin-bottom: 1.2rem;
    }
 
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #a32d2d;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
 
    .field input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid #000000;
      border-radius: 14px;
      font-size: 14px;
      color: #501313;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      background: #fff;
      transition: border 0.2s, box-shadow 0.2s;
    }
 
    .field input::placeholder {
      color: #000000;
    }
 
    .field input:focus {
      border-color: #e24b4a;
      box-shadow: 0 0 0 3px #fcebeb;
    }
 
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
 
    .check-wrap {
      display: flex;
      align-items: center;
      gap: 7px;
      cursor: pointer;
    }
 
    .check-wrap input[type="checkbox"] {
      accent-color: #e24b4a;
      width: 15px;
      height: 15px;
      cursor: pointer;
    }
 
    .check-wrap span {
      font-size: 13px;
      color: #791f1f;
    }
 
    .forgot {
      font-size: 13px;
      color: #e24b4a;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
 
    .forgot:hover {
      color: #ff0000;
    }
 
    /* !important para vencer o "button { background: #f00c0c }" do style.css global */
    .btn {
      width: 100% !important;
      padding: 13px !important;
      background: linear-gradient(0deg, rgba(247, 247, 247, 0.767) 0%, rgb(223, 200, 200) 100%);
      color: #000000 !important;
      font-size: 15px !important;
      font-weight: 500 !important;
      font-family: 'DM Sans', sans-serif !important;
      border: none !important;
      border-radius: 14px !important;
      cursor: pointer;
      letter-spacing: 0.02em;
      display: block;
      text-align: center;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    }
 
    .btn:hover {
      background: #ff0000 !important;
      box-shadow: 0 4px 16px #f09595 !important;
      transform: none !important;
    }
 
    .btn:active {
      transform: scale(0.98) !important;
    }
 
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 1.4rem 0;
    }
 
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #f7c1c1;
    }
 
    .divider span {
      font-size: 12px;
      color: #ff0000;
    }
 
    .social-btn {
      width: 100% !important;
      padding: 11px !important;
      background: #fff !important;
      border: 1px solid #f7c1c1 !important;
      border-radius: 14px !important;
      font-size: 14px !important;
      font-family: 'DM Sans', sans-serif !important;
      color: #ff0000 !important;
      cursor: pointer;
      display: flex !important;
      align-items: center;
      justify-content: center;
      gap: 9px;
      transition: border 0.2s, background 0.2s;
    }
 
    .social-btn:hover {
      background: #fcebeb !important;
      border-color: #ff0000 !important;
      transform: none !important;
    }
 
    .social-icon {
      width: 18px;
      height: 18px;
    }
 
    .footer {
      margin-top: 1.4rem;
      text-align: center;
      font-size: 13px;
      color: #a32d2d;
    }
 
    .footer a {
      color: #e24b4a;
      font-weight: 500;
      text-decoration: none;
      transition: color 0.2s;
    }
 
    .footer a:hover {
      color: #ff0000;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="logo">
        <div class="logo-dot">
          
        </div>
        <span class="logo-text">REDFOX MANUTENÇÃO</span>
      </div>
      <h2>Bem-vindo!</h2>
      <p class="subtitle">Entre na sua conta para continuar</p>
      <div class="field">
        <label for="email">E-mail</label>
        <input id="email" type="email" placeholder="seu@email.com" />
      </div>
      <div class="field">
        <label for="password">Senha</label>
        <input id="password" type="password" placeholder="••••••••" />
      </div>
      <div class="row">
        <label class="check-wrap">
          <input type="checkbox" />
          <span>Lembrar de mim</span>
        </label>
        <a href="#" class="forgot">Esqueci a senha</a>
      </div>
      <a href="{% url 'home' %}">
      <button class="btn">Entrar</button>
      </a>
      <div class="divider"><span>ou continue com</span></div>
      <button class="social-btn">
        <svg class="social-icon" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
          <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
          <path fill="#FBBC05" d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z"/>
          <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.962L3.964 7.294C4.672 5.163 6.656 3.58 9 3.58z"/>
        </svg>
        Entrar com Google
      </button>
      <p class="footer">Não tem uma conta? <a href="#">Criar conta</a></p>
    </div>
  </div>
  <script>
    const btn = document.getElementById('loginBtn');
    btn.addEventListener('click', () => {
      btn.textContent = 'Entrando...';
      setTimeout(() => btn.textContent = 'Entrar', 1500);
    });
  </script>
  
</body>
</html>
